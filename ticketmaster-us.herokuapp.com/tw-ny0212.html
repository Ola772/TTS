```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tickets</title>

<!-- jQuery -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #0f172a;
    color: white;
    margin: 0;
}

/* Top bar */
.top-bar {
    display: flex;
    justify-content: space-between;
    padding: 14px 16px;
    background: #111827;
    font-weight: bold;
}

/* Tabs */
.tabs {
    display: flex;
    background: #1f2937;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    opacity: 0.6;
    cursor: pointer;
}

.tab.active {
    opacity: 1;
    border-bottom: 3px solid #3b82f6;
}

/* Ticket card */
.card {
    background: white;
    color: black;
    border-radius: 16px;
    margin: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.card img {
    width: 100%;
}

.card-content {
    padding: 12px;
}

.card-title {
    font-weight: bold;
}

.card-sub {
    font-size: 12px;
    color: gray;
}

/* Buttons */
.btns {
    display: flex;
    gap: 10px;
    padding: 10px;
}

button {
    flex: 1;
    background: #2563eb;
    border: none;
    padding: 12px;
    border-radius: 10px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* Overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
}

/* Modal */
.modal {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    color: black;
    border-radius: 20px 20px 0 0;
    transition: 0.4s ease;
    padding: 20px;
}

.modal.active {
    bottom: 0;
}

/* Drag handle */
.handle {
    width: 40px;
    height: 5px;
    background: #ccc;
    border-radius: 10px;
    margin: 0 auto 10px;
}

/* Seat */
.seat {
    border: 1px solid #ccc;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
}

.seat.selected {
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<div class="top-bar">
    <div>✕</div>
    <div>My Tickets</div>
    <div>Help</div>
</div>

<div class="tabs">
    <div class="tab active">MY TICKETS</div>
    <div class="tab">ADD-ONS</div>
</div>

<!-- Ticket -->
<div class="card">
    <img src="https://s1.ticketm.net/dam/a/2a7/70e4e1ab-52f1-4df1-94a8-186fe4a602a7_EVENT_DETAIL_PAGE_16_9.jpg">
    
    <div class="card-content">
        <div class="card-title">Concert Event</div>
        <div class="card-sub">May 16 • 7:00PM • Stadium</div>
    </div>

    <div class="btns">
        <button id="transferBtn">Transfer</button>
        <button>Sell</button>
    </div>
</div>

<!-- Overlay + Modal -->
<div class="overlay" id="overlay">
    <div class="modal" id="modal">
        
        <div class="handle"></div>
        <h3>Select Ticket</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 5</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>

        <button onclick="closeModal()">Done</button>

    </div>
</div>

<script>
// Open modal
$("#transferBtn").click(function () {
    $("#overlay").fadeIn(200);
    $("#modal").addClass("active");
});

// Close modal
function closeModal() {
    $("#modal").removeClass("active");
    setTimeout(() => {
        $("#overlay").fadeOut(200);
    }, 300);
}

// Seat selection
function toggleSeat(el) {
    el.classList.toggle("selected");
}
</script>

</body>
</html>
```
