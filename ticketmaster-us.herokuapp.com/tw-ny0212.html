<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket UI</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f5;
}

/* FLOATING PILL BUTTON */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 30px;
    padding: 8px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    gap: 5px;
}

.floating button {
    border: none;
    background: transparent;
    padding: 10px 18px;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
}

.floating button.active {
    background: #eee;
}

/* OVERLAY */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* BOTTOM SHEET */
.sheet {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.35s ease;
}

.sheet.active {
    bottom: 0;
}

/* HANDLE */
.handle {
    width: 40px;
    height: 5px;
    background: #ccc;
    border-radius: 10px;
    margin: 0 auto 15px;
}

/* SEAT LIST */
.seat {
    padding: 15px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.seat.selected {
    color: #2563eb;
    font-weight: bold;
}

/* CONFIRM BUTTON */
.confirm {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- FLOAT BUTTON -->
<div class="floating">
    <button id="transferBtn">Transfer</button>
    <button>Sell</button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeSheet()">
    <div class="sheet" id="sheet" onclick="event.stopPropagation()">

        <div class="handle"></div>

        <h3>Select Tickets</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 5</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>

        <button class="confirm" onclick="confirmTransfer()">Transfer</button>

    </div>
</div>

<script>
// OPEN SHEET
document.getElementById("transferBtn").onclick = function () {
    document.getElementById("overlay").style.display = "block";
    setTimeout(() => {
        document.getElementById("sheet").classList.add("active");
    }, 10);
};

// CLOSE SHEET
function closeSheet() {
    document.getElementById("sheet").classList.remove("active");
    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
    }, 300);
}

// SELECT SEAT
function toggleSeat(el) {
    el.classList.toggle("selected");
}

// CONFIRM
function confirmTransfer() {
    let selected = document.querySelectorAll(".seat.selected");

    if (selected.length === 0) {
        alert("Select at least one ticket");
        return;
    }

    alert("Transfer started for " + selected.length + " ticket(s)");
    closeSheet();
}
</script>

</body>
</html>
