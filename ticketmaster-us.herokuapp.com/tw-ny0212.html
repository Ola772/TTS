.header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}
.header-content {
    position: absolute;
    bottom: 15px;
    left: 15px;
}
.header-title {
    font-size: 22px;
    font-weight: bold;
}
.header-sub {
    font-size: 13px;
}

/* TABS */
.tabs {
    display: flex;
    background: white;
}
.tab {
    flex: 1;
    text-align: center;
    padding: 14px;
    color: #777;
}
.tab.active {
    color: black;
    border-bottom: 3px solid black;
}

/* ORDER */
.order {
    padding: 15px;
    background: white;
    font-size: 14px;
}

/* CARD */
.card {
    background: white;
    margin: 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ddd;
}

.card-header {
    background: #eee;
    padding: 12px;
    font-size: 12px;
    font-weight: bold;
}

.card-body {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    text-align: center;
    background: #fafafa;
}

.label {
    font-size: 11px;
    color: #777;
}
.value {
    font-size: 16px;
    font-weight: bold;
}

/* TRANSFER ROW */
.transfer-row {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    align-items: center;
    font-size: 14px;
    border-top: 1px solid #eee;
}

.transfer-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.circle {
    width: 30px;
    height: 30px;
    background: #eee;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* FLOATING BUTTON */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 40px;
    padding: 12px 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    gap: 25px;
}

.floating button {
    border: none;
    background: none;
    font-weight: 600;
    color: #777;
    cursor: pointer;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* SHEET */
#sheet {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.3s;
}

.seat {
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.seat.selected {
    color: #2563eb;
    font-weight: bold;
}

.confirm {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    font-weight: bold;
}

/* TRANSFER PAGE */
#transferPage {
    display: none;
    padding: 20px;
    background: white;
    min-height: 100vh;
}

.input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.submit {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- MAIN -->
<div id="mainPage">

<div class="header">
    <div class="header-content">
        <div class="header-sub">FRI • JUL 17, 2026 • 7:30 PM</div>
        <div class="header-title"ENHYPEN WORLD TOUR 'BLOOD SAGA' IN UNITED STATES </div>
        <div class="header-sub">American Airlines Center - Dallas, TX</div>
    </div>
</div>

<div class="tabs">
    <div class="tab active">Tickets</div>
    <div class="tab">Extras</div>
</div>

<div class="order">
    <b>Order #44-26129/NCA</b><br>
    <span style="color:#777;">x2 Tickets</span>
</div>

<!-- CARD 1 -->
<div class="card">
    <div class="card-header">LOWER LEVEL - Blood Package  </div>

    <div class="card-body">
          <div><div class="label">SECTION</div><div class="value">120</div></div>
        <div><div class="label">ROW</div><div class="value">D</div></div>
        <div><div class="label">SEAT</div><div class="value">6</div></div>
    </div>

    <div class="transfer-row">
        <div class="transfer-left">
            <div class="circle"></div>
            <span></span>
        </div>
        
    </div>
</div>

<!-- CARD 2 -->
<div class="card">
    <div class="card-header">LOWER LEVEL - Blood Package    </div>

    <div class="card-body">
        <div><div class="label">SECTION</div><div class="value">120</div></div>
        <div><div class="label">ROW</div><div class="value">D</div></div>
        <div><div class="label">SEAT</div><div class="value">7</div></div>
    </div>

    <div class="transfer-row">
        <div class="transfer-left">
            <div class="circle"></div>
            <span></span>
        </div>
        
    </div>
</div>

<div class="floating">
    <button id="transferBtn">Transfer</button>
    <button>Sell</button>
</div>

</div>

<!-- TRANSFER FORM -->
<div id="transferPage">
    <h2>Transfer Tickets</h2>
    <input class="input" placeholder="Full Name">
    <input class="input" placeholder="Email Address">
    <input class="input" placeholder="Phone Number">

    <button class="submit" onclick="finishTransfer()">Send Transfer</button>
</div>

<!-- SHEET -->
<div id="overlay">
    <div id="sheet">
        <h3>Select Tickets</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 7</div>

        <button class="confirm" onclick="goToTransfer()">Continue</button>
    </div>
</div>

<script>
// OPEN
transferBtn.onclick = () => {
    overlay.style.display = "block";
    setTimeout(()=>sheet.style.bottom="0",10);
};

// CLOSE
overlay.onclick = () => {
    sheet.style.bottom = "-100%";
    setTimeout(()=>overlay.style.display="none",300);
};
sheet.onclick = e => e.stopPropagation();

// SELECT
function toggleSeat(el){
    el.classList.toggle("selected");
}

// GO TO FORM
function goToTransfer(){
    let selected = document.querySelectorAll(".seat.selected");

    if(selected.length === 0){
        alert("Select at least one ticket");
        return;
    }

    mainPage.style.display = "none";
    transferPage.style.display = "block";
}

// FINAL
function finishTransfer(){
    alert("Transfer Sent!");
}
</script>

</body>
</html>
