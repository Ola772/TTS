<!<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f2f2f2;
}

/* HEADER */
.header {
    height: 240px;
    background: url('https://s1.ticketm.net/dam/a/2a7/70e4e1ab-52f1-4df1-94a8-186fe4a602a7_EVENT_DETAIL_PAGE_16_9.jpg') center/cover;
    position: relative;
    color: white;
}

.header::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
}

.header-content {
    position: absolute;
    bottom: 20px;
    left: 15px;
    z-index: 2;
}

.header-title {
    font-size: 22px;
    font-weight: bold;
}

.header-sub {
    font-size: 13px;
    opacity: 0.9;
}

/* TABS */
.tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid #ddd;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 14px;
    font-weight: 500;
    color: #777;
}

.tab.active {
    color: black;
    border-bottom: 3px solid black;
}

/* ORDER */
.order {
    background: white;
    padding: 15px;
    font-size: 14px;
}

/* TICKET CARD */
.ticket {
    margin: 12px;
    background: white;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.ticket-header {
    padding: 12px;
    font-size: 12px;
    background: #f0f0f0;
    font-weight: bold;
}

.ticket-body {
    display: flex;
    justify-content: space-around;
    padding: 18px;
    text-align: center;
}

.label {
    font-size: 11px;
    color: #888;
}

.value {
    font-size: 16px;
    font-weight: bold;
}

/* FLOATING ACTION BAR */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 40px;
    padding: 12px 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    gap: 25px;
}

.floating button {
    border: none;
    background: none;
    font-weight: 600;
    color: #555;
    cursor: pointer;
}

.floating button:hover {
    color: black;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* SHEET */
#sheet {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.3s;
}

/* HANDLE */
.handle {
    width: 40px;
    height: 5px;
    background: #ccc;
    border-radius: 10px;
    margin: 0 auto 15px;
}

/* SEATS */
.seat {
    padding: 15px;
    border-bottom: 1px solid #eee;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.seat.selected {
    color: #2563eb;
    font-weight: bold;
}

/* BUTTON */
.confirm {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 12px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-content">
        <div class="header-sub">SAT • MAY 16, 2026 • 7:00 PM</div>
        <div class="header-title">BTS WORLD TOUR 'ARIRANG'</div>
        <div class="header-sub">Stanford Stadium</div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">Tickets</div>
    <div class="tab">Extras</div>
</div>

<!-- ORDER -->
<div class="order">
    <strong>Order #44-26129/NCA</strong><br>
    <span style="color:#777;">2 Tickets</span>
</div>

<!-- TICKET -->
<div class="ticket">
    <div class="ticket-header">ARMY MEMBERSHIP PRESALE</div>

    <div class="ticket-body">
        <div>
            <div class="label">SECTION</div>
            <div class="value">B</div>
        </div>
        <div>
            <div class="label">ROW</div>
            <div class="value">8</div>
        </div>
        <div>
            <div class="label">SEATS</div>
            <div class="value">5-6</div>
        </div>
    </div>
</div>

<!-- FLOATING -->
<div class="floating">
    <button id="transferBtn">Transfer</button>
    <button>Sell</button>
</div>

<!-- OVERLAY -->
<div id="overlay">
    <div id="sheet">

        <div class="handle"></div>

        <h3>Select Tickets</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 5</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>

        <button class="confirm" onclick="confirmTransfer()">Transfer</button>

    </div>
</div>

<script>
// OPEN
document.getElementById("transferBtn").onclick = function () {
    document.getElementById("overlay").style.display = "block";

    setTimeout(() => {
        document.getElementById("sheet").style.bottom = "0";
    }, 10);
};

// CLOSE
document.getElementById("overlay").onclick = function () {
    closeSheet();
};

document.getElementById("sheet").onclick = function (e) {
    e.stopPropagation();
};

function closeSheet() {
    document.getElementById("sheet").style.bottom = "-100%";

    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
    }, 300);
}

// SELECT
function toggleSeat(el) {
    el.classList.toggle("selected");
}

// CONFIRM
function confirmTransfer() {
    let selected = document.querySelectorAll(".seat.selected");

    if (selected.length === 0) {
        alert("Select at least one ticket");
        return;
    }

    alert("Transfer started for " + selected.length + " ticket(s)");
    closeSheet();
}
</script>

</body>
</html>
