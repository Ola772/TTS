<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket UI</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f5;
}

/* HEADER */
.header {
    position: relative;
    height: 220px;
    background: url('https://s1.ticketm.net/dam/a/2a7/70e4e1ab-52f1-4df1-94a8-186fe4a602a7_EVENT_DETAIL_PAGE_16_9.jpg') center/cover;
    color: rgb(16, 10, 10);
}

.header-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

.header-content {
    position: absolute;
    bottom: 15px;
    left: 15px;
}

/* TABS */
.tabs {
    display: flex;
    background: white;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    color: gray;
}

.tab.active {
    color: black;
    border-bottom: 3px solid black;
}

/* ORDER */
.order {
    padding: 15px;
    background: white;
}

/* TICKET */
.ticket {
    background: white;
    margin: 10px 15px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.ticket-header {
    padding: 10px;
    font-size: 12px;
    background: #eee;
    font-weight: bold;
}

.ticket-body {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    text-align: center;
}

.label {
    color: gray;
    font-size: 11px;
}

/* BUTTONS */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 30px;
    padding: 10px 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: flex;
    gap: 20px;
}

.floating button {
    border: none;
    background: none;
    font-weight: bold;
    cursor: pointer;
}
 .floating button:hover {
     color: black;
     }

/* MODAL */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
}

.modal {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.3s;
}

.modal.active {
    bottom: 0;
}

.seat {
    padding: 12px;
    border: 1px solid #ccc;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
}

.seat.selected {
    background: #2563eb;
    color: white;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-overlay"></div>

    <div class="header-content">
        <div class="header-sub">SAT • MAY 16, 2026 • 7:00 PM</div>
        <div class="header-title">BTS WORLD TOUR 'ARIRANG'</div>
        <div class="header-sub">Stanford Stadium- Stanford, CA</div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">Tickets</div>
    <div class="tab">Extras</div>
</div>

<!-- ORDER -->
<div class="order">
    <b>Order #44-26129/NCA</b><br>
    x2 Tickets
</div>

<!-- TICKETS -->
<div class="ticket">
    <div class="ticket-header">PREFERRED SEATING</div>
    <div class="ticket-body">
        <div><div class="label">SECTION</div>Sec B</div>
        <div><div class="label">ROW</div>8</div>
        <div><div class="label">SEAT</div>5</div>
    </div>
</div>

<div class="ticket">
    <div class="ticket-header">PREFERRED SEATING</div>
    <div class="ticket-body">
        <div><div class="label">SECTION</div>Sec B</div>
        <div><div class="label">ROW</div>8</div>
        <div><div class="label">SEAT</div>6</div>
    </div>
</div>

<!-- FLOATING BUTTONS -->
<div class="floating">
    <button id="transferBtn">Transfer</button>
    <button>Sell</button>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
    <div class="modal" id="modal">

        <h3>Select Ticket to Transfer</h3>

        <div class="seat" onclick="selectSeat(this)">Seat 5</div>
        <div class="seat" onclick="selectSeat(this)">Seat 6</div>

        <button onclick="confirmTransfer()">Confirm Transfer</button>
        <button onclick="closeModal()">Cancel</button>

    </div>
</div>

<script>

// OPEN TRANSFER
document.getElementById("transferBtn").onclick = function () {
    document.getElementById("overlay").style.display = "block";
    setTimeout(() => {
        document.getElementById("modal").classList.add("active");
    }, 50);
};

// CLOSE MODAL
function closeModal() {
    document.getElementById("modal").classList.remove("active");
    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
    }, 300);
}

// SELECT SEAT
function selectSeat(el) {
    el.classList.toggle("selected");
}

// CONFIRM TRANSFER
function confirmTransfer() {
    let selected = document.querySelectorAll(".seat.selected");

    if (selected.length === 0) {
        alert("Select a ticket first!");
        return;
    }

    alert("Transfer initiated for " + selected.length + " ticket(s)");
    closeModal();
}

</script>

</body>
</html>
