<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ticket UI</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #f5f5f5;
}

/* HEADER */
.header {
    position: relative;
    height: 220px;
    background: url('https://s1.ticketm.net/dam/a/2a7/70e4e1ab-52f1-4df1-94a8-186fe4a602a7_EVENT_DETAIL_PAGE_16_9.jpg') center/cover;
    color: white;
}

.header-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
}

.header-content {
    position: absolute;
    bottom: 15px;
    left: 15px;
}

.header-title {
    font-size: 20px;
    font-weight: bold;
}

.header-sub {
    font-size: 12px;
}

/* TABS */
.tabs {
    display: flex;
    background: white;
}

.tab {
    flex: 1;
    text-align: center;
    padding: 12px;
    color: gray;
    font-weight: 500;
}

.tab.active {
    color: black;
    border-bottom: 3px solid black;
}

/* ORDER */
.order {
    padding: 15px;
    background: white;
    margin-top: 5px;
}

.order-title {
    font-weight: bold;
}

/* TICKET */
.ticket {
    background: white;
    margin: 10px 15px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ddd;
}

.ticket-header {
    padding: 10px;
    font-size: 12px;
    background: #eee;
    font-weight: bold;
}

.ticket-body {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    text-align: center;
}

.ticket-body div {
    font-size: 14px;
}

.label {
    color: gray;
    font-size: 11px;
}

/* FLOATING BUTTON (UNCHANGED LOOK) */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 30px;
    padding: 10px 20px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    display: flex;
    gap: 20px;
}

.floating button {
    border: none;
    background: none;
    font-weight: bold;
    color: gray;
    cursor: pointer;
}

.floating button:hover {
    color: black;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* BOTTOM SHEET */
#sheet {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.3s ease;
}

.seat {
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.seat.selected {
    color: #2563eb;
    font-weight: bold;
}

/* CONFIRM BUTTON */
.confirm {
    margin-top: 20px;
    width: 100%;
    padding: 12px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-overlay"></div>

    <div class="header-content">
        <div class="header-sub">SAT • MAY 16, 2026 • 7:00 PM</div>
        <div class="header-title">BTS WORLD TOUR 'ARIRANG'</div>
        <div class="header-sub">Stanford Stadium</div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <div class="tab active">Tickets</div>
    <div class="tab">Extras</div>
</div>

<!-- ORDER -->
<div class="order">
    <div class="order-title">Order #44-26129/NCA</div>
    <div style="font-size:12px;color:gray;">x2 Tickets</div>
</div>

<!-- TICKETS -->
<div class="ticket">
    <div class="ticket-header">ARMY MEMBERSHIP PRESALE</div>

    <div class="ticket-body">
        <div>
            <div class="label">SECTION</div>
            <div>Sec B</div>
        </div>
        <div>
            <div class="label">ROW</div>
            <div>8</div>
        </div>
        <div>
            <div class="label">SEAT</div>
            <div>5</div>
        </div>
    </div>
</div>

<div class="ticket">
    <div class="ticket-header">ARMY MEMBERSHIP PRESALE</div>

    <div class="ticket-body">
        <div>
            <div class="label">SECTION</div>
            <div>Sec B</div>
        </div>
        <div>
            <div class="label">ROW</div>
            <div>8</div>
        </div>
        <div>
            <div class="label">SEAT</div>
            <div>6</div>
        </div>
    </div>
</div>

<!-- FLOATING BUTTON -->
<div class="floating">
    <button id="transferBtn">Transfer</button>
    <button>Sell</button>
</div>

<!-- OVERLAY -->
<div id="overlay">
    <div id="sheet">

        <h3>Select Tickets</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 5</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>

        <button class="confirm" onclick="confirmTransfer()">Transfer</button>

    </div>
</div>

<script>
// OPEN SHEET
document.getElementById("transferBtn").onclick = function () {
    document.getElementById("overlay").style.display = "block";

    setTimeout(() => {
        document.getElementById("sheet").style.bottom = "0";
    }, 10);
};

// CLOSE WHEN CLICK OUTSIDE
document.getElementById("overlay").onclick = function () {
    closeSheet();
};

document.getElementById("sheet").onclick = function (e) {
    e.stopPropagation();
};

// CLOSE FUNCTION
function closeSheet() {
    document.getElementById("sheet").style.bottom = "-100%";

    setTimeout(() => {
        document.getElementById("overlay").style.display = "none";
    }, 300);
}

// SELECT SEAT
function toggleSeat(el) {
    el.classList.toggle("selected");
}

// CONFIRM TRANSFER
function confirmTransfer() {
    let selected = document.querySelectorAll(".seat.selected");

    if (selected.length === 0) {
        alert("Select at least one ticket");
        return;
    }

    alert("Transfer started for " + selected.length + " ticket(s)");
    closeSheet();
}
</script>

</body>
</html>
