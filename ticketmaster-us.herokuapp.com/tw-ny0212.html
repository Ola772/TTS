/* TABS */

    background: white;
}

}

}

/* ORDER */
.order {
    padding: 15px;
    background: white;
    font-size: 14px;
}

/* CARD */
.card {
    background: white;
    margin: 12px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #ddd;
}

.card-header {
    background: #eee;
    padding: 12px;
    font-size: 12px;
    font-weight: bold;
}

.card-body {
    display: flex;
    justify-content: space-around;
    padding: 15px;
    text-align: center;
    background: #fafafa;
}

.label {
    font-size: 11px;
    color: #777;
}
.value {
    font-size: 16px;
    font-weight: bold;
}

/* TRANSFER ROW */
.transfer-row {
    display: flex;
    justify-content: space-between;
    padding: 12px;
    align-items: center;
    font-size: 14px;
    border-top: 1px solid #eee;
}

.transfer-left {
    display: flex;
    align-items: center;
    gap: 10px;
}

.circle {
    width: 30px;
    height: 30px;
    background: #eee;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* FLOATING BUTTON */
.floating {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border-radius: 40px;
    padding: 12px 25px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    display: flex;
    gap: 25px;
}

.floating button {
    border: none;
    background: none;
    font-weight: 600;
    color: #777;
    cursor: pointer;
}

/* OVERLAY */
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
}

/* SHEET */
#sheet {
    position: absolute;
    bottom: -100%;
    width: 100%;
    background: white;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    transition: 0.3s;
}

.seat {
    padding: 15px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.seat.selected {
    color: #2563eb;
    font-weight: bold;
}

.confirm {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    font-weight: bold;
}

/* TRANSFER PAGE */
#transferPage {
    display: none;
    padding: 20px;
    background: white;
    min-height: 100vh;
}

.input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

.submit {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    border: none;
    background: #2563eb;
    color: white;
    border-radius: 10px;
}
</style>

    <input class="input" placeholder="Phone Number">

<!-- SHEET -->
<div id="overlay">
    <div id="sheet">
        <h3>Select Tickets</h3>

        <div class="seat" onclick="toggleSeat(this)">Seat 6</div>
        <div class="seat" onclick="toggleSeat(this)">Seat 7</div>

        <button class="confirm" onclick="goToTransfer()">Continue</button>
    </div>
</div>

<script>
// OPEN
transferBtn.onclick = () => {
    overlay.style.display = "block";
    setTimeout(()=>sheet.style.bottom="0",10);
};

// CLOSE
overlay.onclick = () => {
    sheet.style.bottom = "-100%";
    setTimeout(()=>overlay.style.display="none",300);
};
sheet.onclick = e => e.stopPropagation();

// SELECT
function toggleSeat(el){
    el.classList.toggle("selected");
}

// GO TO FORM
function goToTransfer(){
    let selected = document.querySelectorAll(".seat.selected");

    if(selected.length === 0){
        alert("Select at least one ticket");
        return;
    }

    mainPage.style.display = "none";
    transferPage.style.display = "block";
}

// FINAL
function finishTransfer(){
    alert("Transfer Sent!");
}
</script>
